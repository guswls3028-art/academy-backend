# ==============================================================================
# Docker Compose 설정 (50명 원장 확장 대비)
# ==============================================================================
# Stateless 환경: 모든 파일은 R2에 저장, 로그는 stdout/stderr로 출력
#
# 로컬 한 번에 빌드·실행:
#   1) 베이스 이미지 빌드: docker build -f docker/Dockerfile.base -t academy-base:latest .
#   2) 서비스 기동:         docker compose up --build
# ==============================================================================

# ── 공통 설정 (YAML 앵커) ────────────────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-base-build: &base-build
  context: .
  target: base
  args:
    BASE_IMAGE: academy-base:latest

x-common-env: &common-env
  DB_NAME: ${DB_NAME}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: ${DB_HOST:-postgres}
  DB_PORT: ${DB_PORT:-5432}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_DB: ${REDIS_DB:-0}
  R2_ACCESS_KEY: ${R2_ACCESS_KEY}
  R2_SECRET_KEY: ${R2_SECRET_KEY}
  R2_ENDPOINT: ${R2_ENDPOINT}
  AWS_REGION: ${AWS_REGION:-ap-northeast-2}

x-worker-env: &worker-env
  <<: *common-env
  DJANGO_SETTINGS_MODULE: apps.api.config.settings.worker
  API_BASE_URL: ${API_BASE_URL:-http://api:8000}
  INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN}

x-dev-volumes: &dev-volumes
  - ./academy:/app/academy
  - ./apps:/app/apps
  - ./libs:/app/libs
  - ./manage.py:/app/manage.py

# ── 서비스 ───────────────────────────────────────────────────────────────────
services:
  # ============================================================================
  # PostgreSQL 데이터베이스 (개발용)
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: academy-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-academy}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - academy-network

  # ============================================================================
  # Redis (상태/보호 레이어 - 선택적)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: academy-redis
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - academy-network

  # ============================================================================
  # API 서버
  # ============================================================================
  api:
    build:
      <<: *base-build
      dockerfile: docker/api/Dockerfile
    image: academy-api:latest
    container_name: academy-api
    env_file: .env
    environment:
      <<: *common-env
      # Django
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-false}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-apps.api.config.settings.prod}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      # R2 Buckets
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      R2_AI_BUCKET: ${R2_AI_BUCKET:-academy-ai}
      R2_VIDEO_BUCKET: ${R2_VIDEO_BUCKET:-academy-video}
      R2_EXCEL_BUCKET: ${R2_EXCEL_BUCKET:-academy-excel}
      # CDN
      CDN_HLS_BASE_URL: ${CDN_HLS_BASE_URL}
      CDN_HLS_SIGNING_SECRET: ${CDN_HLS_SIGNING_SECRET:-}
      CDN_HLS_SIGNING_KEY_ID: ${CDN_HLS_SIGNING_KEY_ID:-v1}
      # SQS
      VIDEO_SQS_QUEUE_NAME: ${VIDEO_SQS_QUEUE_NAME:-academy-v1-video-batch-queue}
      AI_SQS_QUEUE_NAME_LITE: ${AI_SQS_QUEUE_NAME_LITE:-academy-v1-ai-queue}
      AI_SQS_QUEUE_NAME_BASIC: ${AI_SQS_QUEUE_NAME_BASIC:-academy-v1-ai-queue}
      AI_SQS_QUEUE_NAME_PREMIUM: ${AI_SQS_QUEUE_NAME_PREMIUM:-academy-v1-ai-queue}
      # Worker 통신
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN}
      # Site
      SITE_URL: ${SITE_URL:-https://hakwonplus.com}
      # Gunicorn
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_WORKER_CONNECTIONS: ${GUNICORN_WORKER_CONNECTIONS:-1000}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes: *dev-volumes
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - academy-network
    restart: unless-stopped
    logging: *default-logging

  # ============================================================================
  # Video Worker
  # ============================================================================
  video-worker:
    build:
      <<: *base-build
      dockerfile: docker/video-worker/Dockerfile
    image: academy-video-worker:latest
    container_name: academy-video-worker
    env_file: .env
    environment:
      <<: *worker-env
      WORKER_ID: ${VIDEO_WORKER_ID:-video-worker-1}
      EC2_IDLE_STOP_THRESHOLD: ${EC2_IDLE_STOP_THRESHOLD:-5}
      VIDEO_FAST_ACK: ${VIDEO_FAST_ACK:-1}
      SQS_WAIT_TIME_SECONDS: ${SQS_WAIT_TIME_SECONDS:-20}
      VIDEO_SQS_QUEUE_NAME: ${VIDEO_SQS_QUEUE_NAME:-academy-v1-video-batch-queue}
      # R2 Video
      R2_BUCKET: ${R2_VIDEO_BUCKET:-academy-video}
      R2_PREFIX: ${R2_PREFIX:-media/hls/videos}
      R2_REGION: ${R2_REGION:-auto}
      # FFmpeg
      TEMP_DIR: ${VIDEO_WORKER_TEMP_DIR:-/tmp}
      FFMPEG_BIN: ${FFMPEG_BIN:-ffmpeg}
      FFPROBE_BIN: ${FFPROBE_BIN:-ffprobe}
      HLS_TIME_SECONDS: ${HLS_TIME_SECONDS:-6}
      MIN_SEGMENTS_PER_VARIANT: ${MIN_SEGMENTS_PER_VARIANT:-3}
      THUMBNAIL_AT_SECONDS: ${THUMBNAIL_AT_SECONDS:-5}
      UPLOAD_MAX_CONCURRENCY: ${UPLOAD_MAX_CONCURRENCY:-4}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS:-5}
      BACKOFF_BASE_SECONDS: ${BACKOFF_BASE_SECONDS:-0.5}
      BACKOFF_CAP_SECONDS: ${BACKOFF_CAP_SECONDS:-10.0}
    volumes: *dev-volumes
    depends_on:
      api:
        condition: service_healthy
    networks:
      - academy-network
    restart: unless-stopped
    # 로컬용 2GB. 프로덕션은 반드시 4GB(EC2 t4g.medium 또는 Fargate 4GB).
    mem_limit: 2048m
    logging: *default-logging

  # ============================================================================
  # AI Worker CPU (Lite + Basic 큐 처리)
  # ============================================================================
  ai-worker-cpu:
    build:
      <<: *base-build
      dockerfile: docker/ai-worker-cpu/Dockerfile
    image: academy-ai-worker-cpu:latest
    container_name: academy-ai-worker-cpu
    env_file: .env
    environment:
      <<: *worker-env
      AI_WORKER_MODE: cpu
      WORKER_ID: ${AI_WORKER_ID_CPU:-ai-worker-cpu-1}
      EC2_IDLE_STOP_THRESHOLD: ${EC2_IDLE_STOP_THRESHOLD:-5}
      SQS_WAIT_TIME_SECONDS: ${SQS_WAIT_TIME_SECONDS:-20}
      AI_WORKER_BASIC_POLL_WEIGHT: ${AI_WORKER_BASIC_POLL_WEIGHT:-3}
      AI_WORKER_LITE_POLL_WEIGHT: ${AI_WORKER_LITE_POLL_WEIGHT:-1}
      AI_SQS_QUEUE_NAME_LITE: ${AI_SQS_QUEUE_NAME_LITE:-academy-v1-ai-queue}
      AI_SQS_QUEUE_NAME_BASIC: ${AI_SQS_QUEUE_NAME_BASIC:-academy-v1-ai-queue}
      # R2 AI
      R2_AI_BUCKET: ${R2_AI_BUCKET:-academy-ai}
      R2_EXCEL_BUCKET: ${R2_EXCEL_BUCKET:-academy-excel}
      EXCEL_BUCKET_NAME: ${R2_EXCEL_BUCKET:-academy-excel}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - academy-network
    restart: unless-stopped
    logging: *default-logging

  # ============================================================================
  # AI Worker GPU (Premium 큐 처리) — TODO: Dockerfile 정비 후 활성화
  # ============================================================================
  ai-worker-gpu:
    build:
      <<: *base-build
      dockerfile: docker/ai-worker-gpu/Dockerfile
    image: academy-ai-worker-gpu:latest
    container_name: academy-ai-worker-gpu
    env_file: .env
    environment:
      <<: *worker-env
      AI_WORKER_MODE: gpu
      WORKER_ID: ${AI_WORKER_ID_GPU:-ai-worker-gpu-1}
      EC2_IDLE_STOP_THRESHOLD: ${EC2_IDLE_STOP_THRESHOLD:-5}
      SQS_WAIT_TIME_SECONDS: ${SQS_WAIT_TIME_SECONDS:-20}
      AI_SQS_QUEUE_NAME_PREMIUM: ${AI_SQS_QUEUE_NAME_PREMIUM:-academy-v1-ai-queue}
      # R2 AI
      R2_AI_BUCKET: ${R2_AI_BUCKET:-academy-ai}
      R2_EXCEL_BUCKET: ${R2_EXCEL_BUCKET:-academy-excel}
      EXCEL_BUCKET_NAME: ${R2_EXCEL_BUCKET:-academy-excel}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - academy-network
    restart: unless-stopped
    logging: *default-logging
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ============================================================================
  # Messaging Worker (SQS + Solapi SMS/알림톡)
  # ============================================================================
  messaging-worker:
    build:
      <<: *base-build
      dockerfile: docker/messaging-worker/Dockerfile
    image: academy-messaging-worker:latest
    container_name: academy-messaging-worker
    env_file: .env
    environment:
      <<: *worker-env
      MESSAGING_SQS_QUEUE_NAME: ${MESSAGING_SQS_QUEUE_NAME:-academy-v1-messaging-queue}
      SOLAPI_API_KEY: ${SOLAPI_API_KEY}
      SOLAPI_API_SECRET: ${SOLAPI_API_SECRET}
      SOLAPI_SENDER: ${SOLAPI_SENDER}
      SOLAPI_KAKAO_PF_ID: ${SOLAPI_KAKAO_PF_ID:-}
      SOLAPI_KAKAO_TEMPLATE_ID: ${SOLAPI_KAKAO_TEMPLATE_ID:-}
    volumes: *dev-volumes
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - academy-network
    restart: unless-stopped
    logging: *default-logging

networks:
  academy-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
