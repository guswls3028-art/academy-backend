# ==============================================================================
# /dev 콘솔 운영 알림 cron — check_dev_alerts (hourly).
#
# 룰: 만료 D-3 / 연체·실패 인보이스 / 24h 실패 작업 ≥5건 / 24h+ 미답변 BUG/FB
# Slack 전송: settings.DEV_ALERTS_WEBHOOK_URL (env). 미설정 시 평가만 수행.
# 모든 호출은 OpsAuditLog `cron.check_dev_alerts` 로 기록.
#
# 패턴: API 인스턴스 SSM Run Command로 신선한 latest 컨테이너에서 실행
#       (env는 /opt/api.env, V1.1.0 migration step과 동일 패턴).
# ==============================================================================

name: Dev Alerts Cron

on:
  schedule:
    # 매 정시 (UTC). 한국 시간으로 매시 + 9시간.
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Slack 전송 생략 (평가만)"
        required: false
        default: "false"

env:
  AWS_REGION: ap-northeast-2

permissions:
  id-token: write
  contents: read

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve InService API instance
        id: instance
        run: |
          INSTANCE_ID=""
          for ATTEMPT in $(seq 1 3); do
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names academy-v1-api-asg \
              --region ${{ env.AWS_REGION }} \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId | [0]' \
              --output text)
            if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
              echo "Found InService API instance: $INSTANCE_ID"
              break
            fi
            sleep 10
          done
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No InService API instance found"
            exit 1
          fi
          echo "id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Run check_dev_alerts via SSM
        id: run
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.id }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          EXTRA_ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            EXTRA_ARGS="--dry-run"
          fi

          # 신선한 latest 이미지에서 신규 명령(check_dev_alerts) 실행 보장.
          # /opt/api.env (DEV_ALERTS_WEBHOOK_URL 포함) 마운트.
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text --region ${{ env.AWS_REGION }})
          ECR_HOST="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ECR_IMAGE="${ECR_HOST}/academy-api:latest"

          CMD="set -e; aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_HOST} >/dev/null 2>&1; docker pull ${ECR_IMAGE} >/dev/null 2>&1; ENV_FILE=\$(mktemp); docker inspect academy-api --format '{{range .Config.Env}}{{println .}}{{end}}' > \$ENV_FILE; docker run --rm --env-file \$ENV_FILE --network container:academy-api ${ECR_IMAGE} python manage.py check_dev_alerts --silent ${EXTRA_ARGS} 2>&1; EXIT=\$?; rm -f \$ENV_FILE; exit \$EXIT"

          SSM_PARAMS=$(jq -n --arg cmd "$CMD" '{commands: [$cmd]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$SSM_PARAMS" \
            --timeout-seconds 300 \
            --region ${{ env.AWS_REGION }} \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "::group::check_dev_alerts output"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'StandardOutputContent' \
                --output text
              echo "::endgroup::"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "::error::check_dev_alerts $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'StandardOutputContent' \
                --output text
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi
            sleep 10
          done

          echo "::error::SSM command timed out"
          exit 1
