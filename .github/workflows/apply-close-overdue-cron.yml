# ==============================================================================
# One-shot: register the close_overdue_assessments daily EventBridge rule.
#
# Why a workflow:
#   터미널 환경에서 aws events put-rule 호출이 차단되어, OIDC 권한을 갖는
#   GitHub Actions runner 에서 등록.
# Idempotent: put-rule 과 put-targets 는 동일 이름/Id 로 호출하면 overwrite.
# After first successful run, this workflow can be deleted (keep until verified).
# ==============================================================================

name: Apply close-overdue-assessments cron

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  RULE_NAME: academy-v1-close-overdue-assessments
  EVENTBRIDGE_ROLE_ARN: arn:aws:iam::809466760795:role/academy-v1-eventbridge-ssm-purge-role

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Put rule (daily 03:30 KST = 18:30 UTC)
        run: |
          aws events put-rule \
            --name "$RULE_NAME" \
            --region "$AWS_REGION" \
            --schedule-expression "cron(30 18 * * ? *)" \
            --state ENABLED \
            --description "Daily auto-close of overdue exams/homeworks at 03:30 KST"

      - name: Put target (SSM RunCommand → academy-v1-api docker exec)
        run: |
          cat > /tmp/targets.json <<EOF
          {
            "Rule": "$RULE_NAME",
            "Targets": [
              {
                "Id": "SsmRunCommandCloseOverdueAssessments",
                "Arn": "arn:aws:ssm:ap-northeast-2::document/AWS-RunShellScript",
                "RoleArn": "$EVENTBRIDGE_ROLE_ARN",
                "RunCommandParameters": {
                  "RunCommandTargets": [
                    { "Key": "tag:Name", "Values": ["academy-v1-api"] }
                  ]
                },
                "Input": "{\"commands\":[\"docker exec academy-api python manage.py close_overdue_assessments\"]}"
              }
            ]
          }
          EOF
          aws events put-targets --region "$AWS_REGION" --cli-input-json file:///tmp/targets.json

      - name: Verify rule + target
        run: |
          aws events describe-rule --name "$RULE_NAME" --region "$AWS_REGION"
          aws events list-targets-by-rule --rule "$RULE_NAME" --region "$AWS_REGION"

      - name: Summary
        if: always()
        run: |
          echo "## Close-overdue-assessments cron" >> $GITHUB_STEP_SUMMARY
          echo "**Rule:** $RULE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Schedule:** cron(30 18 * * ? *)  # 18:30 UTC = 03:30 KST" >> $GITHUB_STEP_SUMMARY
          echo "**First run:** next 03:30 KST" >> $GITHUB_STEP_SUMMARY
