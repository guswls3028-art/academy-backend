# ==============================================================================
# V1 Manual Deploy — OIDC 전용. 빌드된 이미지를 수동으로 배포.
# SSOT: docs/00-SSOT/v1.1.0/DEPLOYMENT-ARCHITECTURE.md
# 절차: validate → pre-deploy gate → migrate → deploy (ASG refresh) → verify
# 사용법: gh workflow run v1-deploy.yml -f image_sha=sha-XXXXXXXX
# ==============================================================================

name: V1 Deploy (Manual)

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'Image tag to deploy (e.g. sha-abcd1234 or latest)'
        required: false
        default: 'latest'
        type: string
      services:
        description: 'Services to deploy'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - api
          - messaging
          - ai

concurrency:
  group: v1-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 809466760795.dkr.ecr.ap-northeast-2.amazonaws.com
  ALB_DNS: academy-v1-api-alb-1244943981.ap-northeast-2.elb.amazonaws.com
  API_ASG_NAME: academy-v1-api-asg
  MESSAGING_ASG_NAME: academy-v1-messaging-worker-asg
  AI_ASG_NAME: academy-v1-ai-worker-asg

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================================
  # 1. Validate: ECR에 이미지 존재 확인
  # ============================================================
  validate-image:
    name: Validate image in ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      deploy_api: ${{ steps.services.outputs.deploy_api }}
      deploy_messaging: ${{ steps.services.outputs.deploy_messaging }}
      deploy_ai: ${{ steps.services.outputs.deploy_ai }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine image tag
        id: tag
        run: echo "image_tag=${{ inputs.image_sha }}" >> $GITHUB_OUTPUT

      - name: Determine deploy targets
        id: services
        run: |
          SVC="${{ inputs.services }}"
          echo "deploy_api=$( [ "$SVC" = "all" ] || [ "$SVC" = "api" ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "deploy_messaging=$( [ "$SVC" = "all" ] || [ "$SVC" = "messaging" ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "deploy_ai=$( [ "$SVC" = "all" ] || [ "$SVC" = "ai" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Verify images exist in ECR
        run: |
          TAG="${{ steps.tag.outputs.image_tag }}"
          FAIL=false
          for repo in academy-api academy-messaging-worker academy-ai-worker-cpu; do
            DIGEST=$(aws ecr describe-images \
              --repository-name "$repo" \
              --image-ids "imageTag=$TAG" \
              --region ${{ env.AWS_REGION }} \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || echo "NOT_FOUND")
            echo "$repo:$TAG → $DIGEST"
            if [ "$DIGEST" = "NOT_FOUND" ] || [ "$DIGEST" = "None" ]; then
              echo "::error::Image $repo:$TAG not found in ECR"
              FAIL=true
            fi
          done
          if [ "$FAIL" = "true" ]; then
            echo "::error::One or more images not found. Run v1-build-and-push-latest.yml first."
            exit 1
          fi

  # ============================================================
  # 2. Pre-deploy gate: 현재 서비스 상태 확인
  # ============================================================
  pre-deploy-gate:
    name: Pre-deploy health gate
    runs-on: ubuntu-latest
    needs: validate-image
    steps:
      - name: Check health endpoints
        run: |
          echo "=== Pre-deploy health gate ==="
          HEALTHZ=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 \
            "http://${{ env.ALB_DNS }}/healthz" || echo "000")
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 \
            "http://${{ env.ALB_DNS }}/health" || echo "000")
          echo "healthz: $HEALTHZ, health: $HEALTH"
          if [ "$HEALTHZ" != "200" ]; then
            echo "::error::API not healthy (healthz=$HEALTHZ). Fix before deploying."
            exit 1
          fi
          if [ "$HEALTH" != "200" ]; then
            echo "::warning::health=$HEALTH (DB may be unreachable). Proceeding with caution."
          fi

  # ============================================================
  # 3. Re-tag image (SHA → latest, if deploying specific SHA)
  # ============================================================
  retag-image:
    name: Re-tag image to latest
    runs-on: ubuntu-latest
    needs: [validate-image, pre-deploy-gate]
    if: needs.validate-image.outputs.image_tag != 'latest'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Re-tag SHA images to latest
        run: |
          TAG="${{ needs.validate-image.outputs.image_tag }}"
          for repo in academy-api academy-video-worker academy-messaging-worker academy-ai-worker-cpu; do
            echo "Re-tagging $repo:$TAG → $repo:latest"
            MANIFEST=$(aws ecr batch-get-image \
              --repository-name "$repo" \
              --image-ids "imageTag=$TAG" \
              --region ${{ env.AWS_REGION }} \
              --query 'images[0].imageManifest' \
              --output text)
            if [ "$MANIFEST" != "None" ] && [ -n "$MANIFEST" ]; then
              aws ecr put-image \
                --repository-name "$repo" \
                --image-tag latest \
                --image-manifest "$MANIFEST" \
                --region ${{ env.AWS_REGION }} 2>/dev/null || true
              echo "  ✓ $repo re-tagged"
            else
              echo "  ⚠ $repo:$TAG manifest not found, skipping"
            fi
          done

  # ============================================================
  # 4. Run database migrations
  # ============================================================
  run-migrations:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: [validate-image, pre-deploy-gate, retag-image]
    if: |
      always() &&
      needs.pre-deploy-gate.result == 'success' &&
      (needs.retag-image.result == 'success' || needs.retag-image.result == 'skipped') &&
      (needs.validate-image.outputs.deploy_api == 'true')
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Django migrate via SSM
        run: |
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names ${{ env.API_ASG_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId | [0]' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::warning::No InService API instance found for migration. Skipping."
            exit 0
          fi

          echo "Running migrations on instance: $INSTANCE_ID"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["docker exec academy-api python manage.py migrate --no-input 2>&1"]' \
            --timeout-seconds 120 \
            --region ${{ env.AWS_REGION }} \
            --query 'Command.CommandId' \
            --output text)

          for i in $(seq 1 20); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Migration completed successfully"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} --query 'StandardOutputContent' --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "::error::Migration failed: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
                --region ${{ env.AWS_REGION }} --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done
          echo "::error::Migration timed out"
          exit 1

  # ============================================================
  # 5. Deploy: ASG instance refresh
  # ============================================================
  deploy-api:
    name: Deploy API (ASG refresh)
    runs-on: ubuntu-latest
    needs: [validate-image, run-migrations, retag-image]
    if: |
      always() &&
      needs.validate-image.outputs.deploy_api == 'true' &&
      (needs.run-migrations.result == 'success' || needs.run-migrations.result == 'skipped') &&
      (needs.retag-image.result == 'success' || needs.retag-image.result == 'skipped')
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Scale up API ASG for zero-downtime (desired 1→2)
        id: scaleup
        continue-on-error: true
        run: |
          CURRENT_DESIRED=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names ${{ env.API_ASG_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'AutoScalingGroups[0].DesiredCapacity' --output text)
          echo "current_desired=$CURRENT_DESIRED" >> $GITHUB_OUTPUT
          if [ "$CURRENT_DESIRED" = "1" ]; then
            echo "Scaling up to desired=2 for zero-downtime deploy..."
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name ${{ env.API_ASG_NAME }} \
              --region ${{ env.AWS_REGION }} --desired-capacity 2 --max-size 3
            echo "Waiting 90s for new instance to register with ALB..."
            sleep 90
            HEALTHY=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names ${{ env.API_ASG_NAME }} \
              --region ${{ env.AWS_REGION }} \
              --query 'AutoScalingGroups[0].Instances[?HealthStatus==`Healthy`] | length(@)' --output text)
            echo "Healthy instances: $HEALTHY"
          fi

      - name: Start API ASG instance refresh
        id: refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ env.API_ASG_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":300,"SkipMatching":true}' \
            --query 'InstanceRefreshId' --output text)
          echo "refresh_id=$REFRESH_ID" >> $GITHUB_OUTPUT
          echo "API ASG instance refresh started: $REFRESH_ID"

      - name: Wait for API refresh to complete
        run: |
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"
          for i in $(seq 1 20); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name ${{ env.API_ASG_NAME }} \
              --instance-refresh-ids "$REFRESH_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'InstanceRefreshes[0].Status' --output text)
            echo "Attempt $i/20: API refresh status=$STATUS"
            if [ "$STATUS" = "Successful" ]; then echo "API deploy complete"; exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "::error::API ASG refresh $STATUS"; exit 1; fi
            sleep 30
          done
          echo "::error::API ASG refresh timed out"; exit 1

      - name: Scale down API ASG after deploy (desired 2→1)
        if: always() && steps.scaleup.outputs.current_desired == '1'
        continue-on-error: true
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${{ env.API_ASG_NAME }} \
            --region ${{ env.AWS_REGION }} --desired-capacity 1 --max-size 2

  deploy-messaging:
    name: Deploy Messaging Worker (ASG refresh)
    runs-on: ubuntu-latest
    needs: [validate-image, retag-image]
    if: |
      always() &&
      needs.validate-image.outputs.deploy_messaging == 'true' &&
      (needs.retag-image.result == 'success' || needs.retag-image.result == 'skipped')
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Remove scale-in protection before refresh
        run: |
          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names ${{ env.MESSAGING_ASG_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'AutoScalingGroups[0].Instances[?ProtectedFromScaleIn==`true`].InstanceId' --output text)
          if [ -n "$INSTANCES" ] && [ "$INSTANCES" != "None" ]; then
            aws autoscaling set-instance-protection \
              --auto-scaling-group-name ${{ env.MESSAGING_ASG_NAME }} \
              --instance-ids $INSTANCES --no-protected-from-scale-in --region ${{ env.AWS_REGION }}
          fi

      - name: Start Messaging ASG instance refresh
        id: refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ env.MESSAGING_ASG_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --preferences '{"MinHealthyPercentage":0,"InstanceWarmup":120}' \
            --query 'InstanceRefreshId' --output text)
          echo "refresh_id=$REFRESH_ID" >> $GITHUB_OUTPUT

      - name: Wait for Messaging refresh to complete
        run: |
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"
          for i in $(seq 1 40); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name ${{ env.MESSAGING_ASG_NAME }} \
              --instance-refresh-ids "$REFRESH_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'InstanceRefreshes[0].Status' --output text)
            echo "Attempt $i/40: Messaging refresh status=$STATUS"
            if [ "$STATUS" = "Successful" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then exit 1; fi
            sleep 30
          done
          exit 1

  deploy-ai:
    name: Deploy AI Worker (ASG refresh)
    runs-on: ubuntu-latest
    needs: [validate-image, retag-image]
    if: |
      always() &&
      needs.validate-image.outputs.deploy_ai == 'true' &&
      (needs.retag-image.result == 'success' || needs.retag-image.result == 'skipped')
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Remove scale-in protection before refresh
        run: |
          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names ${{ env.AI_ASG_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'AutoScalingGroups[0].Instances[?ProtectedFromScaleIn==`true`].InstanceId' --output text)
          if [ -n "$INSTANCES" ] && [ "$INSTANCES" != "None" ]; then
            aws autoscaling set-instance-protection \
              --auto-scaling-group-name ${{ env.AI_ASG_NAME }} \
              --instance-ids $INSTANCES --no-protected-from-scale-in --region ${{ env.AWS_REGION }}
          fi

      - name: Start AI ASG instance refresh
        id: refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ env.AI_ASG_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --preferences '{"MinHealthyPercentage":0,"InstanceWarmup":120}' \
            --query 'InstanceRefreshId' --output text)
          echo "refresh_id=$REFRESH_ID" >> $GITHUB_OUTPUT

      - name: Wait for AI refresh to complete
        run: |
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"
          for i in $(seq 1 40); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name ${{ env.AI_ASG_NAME }} \
              --instance-refresh-ids "$REFRESH_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'InstanceRefreshes[0].Status' --output text)
            echo "Attempt $i/40: AI refresh status=$STATUS"
            if [ "$STATUS" = "Successful" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then exit 1; fi
            sleep 30
          done
          exit 1

  # ============================================================
  # 6. Post-deploy verification
  # ============================================================
  verify-deployment:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: [validate-image, deploy-api, deploy-messaging, deploy-ai]
    if: |
      always() &&
      (needs.deploy-api.result == 'success' || needs.deploy-messaging.result == 'success' || needs.deploy-ai.result == 'success')
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify health endpoints
        id: health
        run: |
          PASS=true
          HEALTHZ=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 \
            "http://${{ env.ALB_DNS }}/healthz" || echo "000")
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 \
            "http://${{ env.ALB_DNS }}/health" || echo "000")
          echo "healthz: $HEALTHZ, health: $HEALTH"
          [ "$HEALTHZ" != "200" ] && PASS=false && echo "::error::healthz=$HEALTHZ"
          [ "$HEALTH" != "200" ] && PASS=false && echo "::error::health=$HEALTH"
          echo "health_pass=$PASS" >> $GITHUB_OUTPUT

      - name: Verify ASG health
        id: asg
        run: |
          PASS=true
          for ASG_NAME in ${{ env.API_ASG_NAME }} ${{ env.MESSAGING_ASG_NAME }} ${{ env.AI_ASG_NAME }}; do
            HEALTHY=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$ASG_NAME" --region ${{ env.AWS_REGION }} \
              --query 'AutoScalingGroups[0].Instances[?HealthStatus==`Healthy` && LifecycleState==`InService`] | length(@)' \
              --output text 2>/dev/null || echo "0")
            MIN=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$ASG_NAME" --region ${{ env.AWS_REGION }} \
              --query 'AutoScalingGroups[0].MinSize' --output text 2>/dev/null || echo "0")
            echo "$ASG_NAME: $HEALTHY healthy (min=$MIN)"
            if [ "$HEALTHY" -lt "$MIN" ]; then PASS=false; echo "::error::$ASG_NAME unhealthy"; fi
          done
          echo "asg_pass=$PASS" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "## V1.1.0 Deploy Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ needs.validate-image.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Services:** ${{ inputs.services }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Health endpoints | ${{ steps.health.outputs.health_pass }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ASG instances | ${{ steps.asg.outputs.asg_pass }} |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy-api | ${{ needs.deploy-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy-messaging | ${{ needs.deploy-messaging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy-ai | ${{ needs.deploy-ai.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.health.outputs.health_pass }}" != "true" ] || [ "${{ steps.asg.outputs.asg_pass }}" != "true" ]; then
            echo "::error::Deploy verification FAILED"
            exit 1
          fi
          echo "Deploy verification PASS ✅" >> $GITHUB_STEP_SUMMARY
