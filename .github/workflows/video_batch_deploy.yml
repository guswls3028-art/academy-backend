# ==============================================================================
# Video Batch deploy — SSOT v3. Build video-worker, push ECR, run scripts_v3/deploy.ps1 only.
# Legacy: scripts/infra/*.ps1 직접 호출 금지 (denylist 가드).
# ==============================================================================

name: Video Batch Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docker/video-worker/**"
      - "scripts_v3/**"
      - "scripts/infra/batch/**"
      - "scripts/infra/eventbridge/**"
      - "scripts/infra/cloudwatch/**"
      - ".github/workflows/video_batch_deploy.yml"

concurrency:
  group: video-batch-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  ECR_REPO: academy-video-worker
  JOB_QUEUE_NAME: academy-video-batch-queue

jobs:
  guard-no-legacy-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard — no legacy script execution
        run: |
          if grep -E 'scripts/infra/[^"]*\.ps1' .github/workflows/video_batch_deploy.yml; then
            echo "::error::Legacy script call detected. Use scripts_v3/deploy.ps1 only."
            exit 1
          fi
          echo "Guard OK: no scripts/infra/*.ps1 in run steps"

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      ecr_uri: ${{ steps.meta.outputs.ecr_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_VIDEO_BATCH }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      - name: Configure AWS credentials (fallback keys)
        if: failure()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: ECR URI
        id: meta
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          echo "ecr_uri=${REGISTRY}/${ECR_REPO}:latest" >> $GITHUB_OUTPUT
          echo "ECR_URI=${REGISTRY}/${ECR_REPO}:latest" >> $GITHUB_ENV

      - name: Build and push video-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/video-worker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_URI }}
          cache-from: type=gha,scope=video-batch
          cache-to: type=gha,mode=max,scope=video-batch

  deploy-infra:
    needs: [guard-no-legacy-scripts, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y powershell

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_VIDEO_BATCH }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      - name: Configure AWS credentials (fallback keys)
        if: failure()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: One-Take Deploy (SSOT v3)
        run: pwsh -File scripts_v3/deploy.ps1 -Env prod