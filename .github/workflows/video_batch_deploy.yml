# ==============================================================================
# Video Worker — Build and push to ECR only.
# Infrastructure provisioning (deploy.ps1) is NOT run here.
# Infra changes require broader admin permissions and must use the controlled
# operator path: run-with-env.ps1 -- deploy.ps1 (local/SSH).
# ==============================================================================

name: Video Worker Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docker/video-worker/**"
      - "apps/worker/video_worker/**"
      - "apps/support/video/**"
      - ".github/workflows/video_batch_deploy.yml"

concurrency:
  group: video-batch-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  ECR_REPO: academy-video-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_VIDEO_BATCH }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push video-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/video-worker/Dockerfile
          build-args: BASE_IMAGE=${{ steps.login-ecr.outputs.registry }}/academy-base:latest
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=video-batch
          cache-to: type=gha,mode=max,scope=video-batch

      - name: Summary
        run: |
          echo "## Video Worker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Infra provisioning:** Not included. Use \`run-with-env.ps1 -- deploy.ps1\` for infra changes." >> $GITHUB_STEP_SUMMARY
