# ==============================================================================
# DEPRECATED: Video Worker — Build and push to ECR only.
# This workflow is REDUNDANT with v1-build-and-push-latest.yml which already
# builds+deploys video worker images with SHA tagging and Batch job def updates.
# Kept for workflow_dispatch only (emergency manual builds).
# ==============================================================================

name: Video Worker Build (manual only)

on:
  workflow_dispatch:

concurrency:
  group: video-batch-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  ECR_REPO: academy-video-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_VIDEO_BATCH }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute short SHA
        id: meta
        run: echo "short_sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Build and push video-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/video-worker/Dockerfile
          build-args: BASE_IMAGE=${{ steps.login-ecr.outputs.registry }}/academy-base:latest
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha,scope=video-batch
          cache-to: type=gha,mode=max,scope=video-batch

      - name: Summary
        run: |
          echo "## Video Worker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:sha-${{ steps.meta.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Infra provisioning:** Not included. Use \`run-with-env.ps1 -- deploy.ps1\` for infra changes." >> $GITHUB_STEP_SUMMARY
