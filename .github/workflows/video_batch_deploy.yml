# ==============================================================================
# Video Batch deploy — SSOT v1. Build video-worker, push ECR, run scripts/v1/deploy.ps1 only.
# Legacy: scripts/infra/*.ps1 실행/호출 금지 (denylist 가드).
# ==============================================================================

name: Video Batch Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docker/video-worker/**"
      - "scripts/v1/**"
      - "docs/00-SSOT/**"
      - ".github/workflows/video_batch_deploy.yml"

concurrency:
  group: video-batch-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  ECR_REPO: academy-video-worker
  JOB_QUEUE_NAME: academy-video-batch-queue

jobs:
  guard-no-legacy-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard — no legacy script execution (all workflows)
        run: |
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$f" ] || continue
            if grep -E 'run:.*scripts/infra|pwsh.*scripts/infra|-File.*scripts/infra' "$f"; then
              echo "::error::Legacy script execution detected in $f. Use scripts/v1/deploy.ps1 only."
              exit 1
            fi
            if grep -E 'pwsh.*deploy\.ps1|-File.*deploy\.ps1' "$f" | grep -v 'scripts/v1/deploy.ps1'; then
              echo "::error::Deploy must use scripts/v1/deploy.ps1 only. Found root or other deploy.ps1 in $f."
              exit 1
            fi
          done
          echo "Guard OK: only scripts/v1/deploy.ps1 used for deploy; no scripts/infra"

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      ecr_uri: ${{ steps.meta.outputs.ecr_uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_VIDEO_BATCH }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: ECR URI
        id: meta
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          TAG="${{ github.sha }}"
          echo "ecr_uri=${REGISTRY}/${ECR_REPO}:${TAG}" >> $GITHUB_OUTPUT
          echo "ECR_URI=${REGISTRY}/${ECR_REPO}:${TAG}" >> $GITHUB_ENV

      - name: Build and push video-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/video-worker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_URI }}
          cache-from: type=gha,scope=video-batch
          cache-to: type=gha,mode=max,scope=video-batch

  deploy-infra:
    needs: [guard-no-legacy-scripts, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y powershell

      - name: Configure AWS credentials (OIDC only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_VIDEO_BATCH }}
          aws-region: ${{ env.AWS_REGION }}

      - name: One-Take Deploy (SSOT v1)
        run: pwsh -File scripts/v1/deploy.ps1 -Env prod -Ci -EcrRepoUri "${{ needs.build-and-push.outputs.ecr_uri }}"

      - name: Purge Cloudflare CDN Cache (Video HLS Playlists)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: |
          # Purge only HLS playlist files (.m3u8) from CDN cache — NOT R2 objects.
          # R2 video objects must never be deleted here; only CDN cached responses are invalidated.
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ]; then
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
                 -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_KEY }}" \
                 -H "Content-Type: application/json" \
                 --data '{"files":[{"url":"*.m3u8","prefix":true}]}' \
            || echo "CDN purge failed (non-fatal)"
          else
            echo "CLOUDFLARE_ZONE_ID or token not set; skipping CDN purge"
          fi
