# ==============================================================================
# Weekly infra cleanup — ECR + Batch job def revisions.
# Each step hard-fails on AWS errors so silent regressions surface immediately.
# Runs every Sunday 18:00 UTC = Monday 03:00 KST.
# ==============================================================================

name: Weekly Infra Cleanup

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ACADEMY_DEPLOY_LOCK_TABLE: academy-v1-video-job-lock
  ACADEMY_DEPLOY_LOCK_OWNER: weekly-cleanup:${{ github.run_id }}:${{ github.run_attempt }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: academy-production-mutation
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout cleanup scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/v1/ecr-cleanup.py
            scripts/v1/batch-jobdef-cleanup.py
            scripts/v1/deployment_lock.py
            docs/reports/release-manifest.latest.json
          sparse-checkout-cone-mode: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install boto3 (for batch-jobdef-cleanup.py)
        run: pip install --quiet boto3

      - name: Acquire shared production mutation lock
        env:
          ACADEMY_DEPLOY_LOCK_OWNER: weekly-cleanup:${{ github.run_id }}:${{ github.run_attempt }}
        run: python3 scripts/v1/deployment_lock.py acquire --owner "$ACADEMY_DEPLOY_LOCK_OWNER" --ttl-seconds 3600

      - name: ECR dry-run (log what would be deleted)
        run: python3 scripts/v1/ecr-cleanup.py --dry-run --keep 10

      - name: ECR execute (keep latest + 10 newest sha-)
        run: python3 scripts/v1/ecr-cleanup.py --execute --keep 10

      - name: ECR verify
        run: python3 scripts/v1/ecr-cleanup.py --verify

      - name: Batch job def dry-run (keep latest 5 active per name)
        run: python3 scripts/v1/batch-jobdef-cleanup.py --dry-run --keep 5

      - name: Batch job def execute
        run: python3 scripts/v1/batch-jobdef-cleanup.py --execute --keep 5

      - name: Summary
        if: always()
        run: |
          echo "## Weekly Infra Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Keep policy:** ECR latest + 10 newest sha- · Batch latest 5 active revs/name" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY

      - name: Release shared production mutation lock
        if: always()
        env:
          ACADEMY_DEPLOY_LOCK_OWNER: weekly-cleanup:${{ github.run_id }}:${{ github.run_attempt }}
        run: python3 scripts/v1/deployment_lock.py release --owner "$ACADEMY_DEPLOY_LOCK_OWNER"
