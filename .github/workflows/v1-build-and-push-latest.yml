# ==============================================================================
# V1 ECR build/push — OIDC 전용. Access Key 미사용.
# Backend repo: guswls3028-art/academy-backend. SSOT: docs/00-SSOT/v1/params.yaml.
# 5개 이미지 linux/arm64 latest 빌드·푸시 후 digest를 ci-build.latest.md에 기록.
# ==============================================================================

name: V1 Build and Push latest (OIDC)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 809466760795.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_FOR_ECR_BUILD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repos
        run: |
          for repo in academy-base academy-api academy-video-worker academy-messaging-worker academy-ai-worker-cpu; do
            aws ecr describe-repositories --repository-names "$repo" --region ${{ env.AWS_REGION }} 2>/dev/null || \
            aws ecr create-repository --repository-name "$repo" --region ${{ env.AWS_REGION }}
          done

      - name: Build and push academy-base (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.base
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/academy-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

      - name: Build and push academy-api (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          build-args: BASE_IMAGE=${{ env.ECR_REGISTRY }}/academy-base:latest
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/academy-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push academy-video-worker (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/video-worker/Dockerfile
          build-args: BASE_IMAGE=${{ env.ECR_REGISTRY }}/academy-base:latest
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/academy-video-worker:latest
          cache-from: type=gha,scope=video
          cache-to: type=gha,mode=max,scope=video

      - name: Build and push academy-messaging-worker (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/messaging-worker/Dockerfile
          build-args: BASE_IMAGE=${{ env.ECR_REGISTRY }}/academy-base:latest
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/academy-messaging-worker:latest
          cache-from: type=gha,scope=messaging
          cache-to: type=gha,mode=max,scope=messaging

      - name: Build and push academy-ai-worker-cpu (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ai-worker-cpu/Dockerfile
          build-args: BASE_IMAGE=${{ env.ECR_REGISTRY }}/academy-base:latest
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/academy-ai-worker-cpu:latest
          cache-from: type=gha,scope=ai-cpu
          cache-to: type=gha,mode=max,scope=ai-cpu

      - name: Collect digests and write ci-build.latest.md
        id: digests
        run: |
          BUILD_TIME=$(date -Iseconds)
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          REPORTS_DIR="docs/00-SSOT/v1/reports"
          mkdir -p "$REPORTS_DIR"

          echo "## V1 CI Build — latest 이미지 푸시 증거 (OIDC)" > "$REPORTS_DIR/ci-build.latest.md"
          echo "" >> "$REPORTS_DIR/ci-build.latest.md"
          echo "**Generated:** $BUILD_TIME" >> "$REPORTS_DIR/ci-build.latest.md"
          echo "**SSOT:** docs/00-SSOT/v1/params.yaml" >> "$REPORTS_DIR/ci-build.latest.md"
          echo "**Region:** ${{ env.AWS_REGION }}" >> "$REPORTS_DIR/ci-build.latest.md"
          echo "**gitSha:** $SHA" >> "$REPORTS_DIR/ci-build.latest.md"
          echo "**shortSha:** $SHORT_SHA" >> "$REPORTS_DIR/ci-build.latest.md"
          echo "" >> "$REPORTS_DIR/ci-build.latest.md"
          echo "| repo | tag | imageDigest |" >> "$REPORTS_DIR/ci-build.latest.md"
          echo "|------|-----|-------------|" >> "$REPORTS_DIR/ci-build.latest.md"

          for repo in academy-base academy-api academy-video-worker academy-messaging-worker academy-ai-worker-cpu; do
            DIGEST=$(aws ecr describe-images --repository-name "$repo" --image-ids imageTag=latest --region ${{ env.AWS_REGION }} --query 'imageDetails[0].imageDigest' --output text 2>/dev/null || echo "N/A")
            echo "| $repo | latest | $DIGEST |" >> "$REPORTS_DIR/ci-build.latest.md"
            outname=$(echo "$repo" | tr '-' '_')
            echo "${outname}=${DIGEST}" >> $GITHUB_OUTPUT
          done

          echo "buildTime=$BUILD_TIME" >> $GITHUB_OUTPUT

      - name: Workflow summary
        run: |
          echo "## V1 Build and Push latest (OIDC)" >> $GITHUB_STEP_SUMMARY
          cat docs/00-SSOT/v1/reports/ci-build.latest.md >> $GITHUB_STEP_SUMMARY

      - name: Upload ci-build.latest.md artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-report
          path: docs/00-SSOT/v1/reports/ci-build.latest.md

      - name: Commit and push ci-build.latest.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/00-SSOT/v1/reports/ci-build.latest.md
          if git diff --staged --quiet; then
            echo "No change to ci-build.latest.md"
          else
            git commit -m "chore(ci): update ci-build.latest.md (OIDC build digest)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
