# Academy SSOT v1 — 풀셋팅 단일소스. scripts/v1 전용.
# 1인 개발·운영(장애 대응 10~60분), 1k~1.5k 사용자·동시 50~300 버스트.
# API ASG: 비용 최적화 기준 평시 min/desired=1, max=3.
# 배포 시에는 무중단 refresh를 위해 CI가 일시적으로 desired>=2를 만들 수 있고,
# 평상시에는 ASG target tracking이 1~3대 사이에서 자동 증감한다.

global:
  env: prod
  region: ap-northeast-2
  accountId: "809466760795"
  namingPrefix: academy-
  validationMode: "Strict"
  tags:
    Project: academy
    ManagedBy: ssot-v1

# 2-tier: Public 2 + Private 2, NAT 1개. academy-v1-* 네이밍.
# 기존 RDS(academy-db) 사용 시 동일 VPC 사용.
network:
  vpcId: "vpc-0831a2484f9b114c2"
  vpcCidr: "172.30.0.0/16"
  publicSubnetCidr1: "172.30.0.0/24"
  publicSubnetCidr2: "172.30.2.0/24"
  privateSubnetCidr1: "172.30.1.0/24"
  privateSubnetCidr2: "172.30.3.0/24"
  # V1 운영 단순화: NAT 미사용(0). Private subnet은 데이터(RDS/Redis) 전용.
  natEnabled: false
  albEnabled: true
  natGatewayId: ""
  # 비워두면 Ensure-Network가 academy-v1-sg-app/batch/data를 이름으로 찾거나 생성함. (인프라 리셋 후 재배포 시 필수)
  securityGroupApp: ""
  securityGroupBatch: ""
  securityGroupData: ""
  vpcName: academy-v1-vpc
  sgAppName: academy-v1-sg-app
  sgBatchName: academy-v1-sg-batch
  sgDataName: academy-v1-sg-data

networkPublicSubnets:
  - ""
  - ""
networkPrivateSubnets:
  - ""
  - ""

ssm:
  apiEnv: /academy/api/env
  workersEnv: /academy/workers/env
  deployLockParam: /academy/deploy-lock

ecr:
  baseRepo: academy-base
  apiRepo: academy-api
  videoWorkerRepo: academy-video-worker
  messagingWorkerRepo: academy-messaging-worker
  aiWorkerRepo: academy-ai-worker-cpu
  toolsWorkerRepo: academy-tools-worker
  # 모든 repo는 IMMUTABLE_WITH_EXCLUSION + latest 단일 wildcard exclusion이다.
  # CI의 run-unique sha-*를 digest로 해석하고, 수동 deploy는 검증 완료 release manifest만 사용한다.
  useLatestTag: false
  immutableTagRequired: true

githubActions:
  deployRoleName: academy-gha-ecr-build
  deployPolicyName: EcrBuildPush

# API: V1. 평시 min/desired=1, max=3. 롤링 배포 시 instance-refresh MinHealthyPercentage.
# Gunicorn/ALB 타임아웃 60s 내 권장(동영상/AI는 비동기 전용).
api:
  amiId: ami-0885e191a9bcf28b0
  instanceProfile: academy-ec2-role
  securityGroupId: ""  # 비워두면 SecurityGroupApp 사용 (Ensure-Network가 설정)
  instanceType: t4g.medium
  userData: ""
  asgName: academy-v1-api-asg
  asgLaunchTemplateName: academy-v1-api-lt
  asgMinSize: 1
  asgMaxSize: 3
  asgDesiredCapacity: 1
  instanceRefreshMinHealthyPercentage: 100
  instanceRefreshInstanceWarmup: 300
  healthCheckGracePeriodSeconds: 300
  scalingPolicyTargetCpuPercent: 55
  containerName: academy-api
  albName: academy-v1-api-alb
  targetGroupName: academy-v1-api-tg
  acmCertificateArn: arn:aws:acm:ap-northeast-2:809466760795:certificate/5e96d8b9-cc4d-4722-b9fc-6042289d68e1
  httpsSslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
  # ALB/Docker liveness health check는 DB/외부 의존성 체크 금지. 200만 반환하는 /healthz 사용. /health는 DB 연동·503 가능 → readiness/관측용.
  healthPath: /healthz
  instanceTagKey: Name
  instanceTagValue: academy-v1-api
  # 배포된 ALB URL. alb.ps1에서 ALB DNS로 자동 설정됨. api.hakwonplus.com 사용 시 params에 명시.
  apiBaseUrl: ""

messagingWorker:
  asgName: academy-v1-messaging-worker-asg
  launchTemplateName: academy-v1-messaging-worker-lt
  instanceTagValue: academy-v1-messaging-worker
  amiId: ami-0885e191a9bcf28b0
  instanceType: t4g.medium
  # 계정복구/알림톡은 로그인 전 사용자 대기 흐름이므로 cold-start 지연을
  # 허용하지 않는다. Messaging worker는 1대 warm baseline을 유지한다.
  minSize: 1
  # 운영 단순화: 메시징 워커 스케일 상한 축소
  maxSize: 3
  desiredCapacity: 1
  # V1.1.1: scale-in protection 비활성화. min=1이면 큐가 비어도 1대 warm baseline을 유지한다.
  # protection=true면 instance refresh 실패 → 배포 차단 (근본 원인 확인됨).
  scaleInProtection: false
  scalingPolicyScaleOutCooldown: 300
  scalingPolicyScaleInCooldown: 900
  scalingPolicyScaleOutThreshold: 0
  scalingPolicyScaleInThreshold: 0
  sqsQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/809466760795/academy-v1-messaging-queue
  sqsQueueName: academy-v1-messaging-queue
  visibilityTimeoutSeconds: 900
  dlqMaxReceiveCount: 5
  dlqSuffix: -dlq

aiWorker:
  # 문제 생성/OCR성 작업은 SQS 큐로 분리하고 유휴 시 0대까지 축소한다.
  # scale-out 알람이 첫 메시지부터 워커를 깨운다.
  asgName: academy-v1-ai-worker-asg
  launchTemplateName: academy-v1-ai-worker-lt
  instanceTagValue: academy-v1-ai-worker
  amiId: ami-0885e191a9bcf28b0
  instanceType: t4g.medium
  minSize: 0
  maxSize: 5
  desiredCapacity: 0
  # V1.1.1: scale-in protection 비활성화. min=0이면 큐가 비었을 때 0까지 축소 가능.
  # protection=true면 instance refresh 실패 → 배포 차단 (근본 원인 확인됨).
  scaleInProtection: false
  scalingPolicyScaleOutCooldown: 300
  scalingPolicyScaleOutThreshold: 0
  # Scale-in은 CloudWatch 지표 지연을 피하기 위해 워커가 live SQS depth를 확인한 뒤 직접 수행한다.
  # ai-worker-queue-low 알람은 관측용이며 ASG scale-in action을 갖지 않는다.
  sqsQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/809466760795/academy-v1-ai-queue
  sqsQueueName: academy-v1-ai-queue
  visibilityTimeoutSeconds: 1800   # 엑셀 worst-case 30분, graceful shutdown·in-flight 유실 방지
  dlqMaxReceiveCount: 5
  dlqSuffix: -dlq

toolsWorker:
  # PPT/PDF 등 도구성 변환 작업은 AI/OCR 모델 캐시와 분리한다.
  # 비용 최적화를 위해 평시 0대. 큐에 작업이 들어오면 SQS alarm이 워커를 깨운다.
  asgName: academy-v1-tools-worker-asg
  launchTemplateName: academy-v1-tools-worker-lt
  instanceTagValue: academy-v1-tools-worker
  amiId: ami-0885e191a9bcf28b0
  instanceType: t4g.small
  minSize: 0
  maxSize: 2
  desiredCapacity: 0
  scaleInProtection: false
  scalingPolicyScaleOutCooldown: 300
  scalingPolicyScaleInCooldown: 900
  scalingPolicyScaleOutThreshold: 0
  scalingPolicyScaleInThreshold: 0
  sqsQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/809466760795/academy-v1-tools-queue
  sqsQueueName: academy-v1-tools-queue
  visibilityTimeoutSeconds: 1800
  dlqMaxReceiveCount: 5
  dlqSuffix: -dlq

videoBatch:
  # standard: all video encode work. Keep c6g.2xlarge+ so 8-vCPU job definitions can place.
  standard:
    computeEnvironmentName: academy-v1-video-batch-ce-200gb
    videoQueueName: academy-v1-video-batch-queue
    workerJobDefName: academy-v1-video-batch-jobdef
    minvCpus: 0
    maxvCpus: 40
    instanceTypes:
      - c6g.4xlarge
      - c6g.2xlarge
      - c6g.xlarge
    rootVolumeSizeGb: 200
    jobTimeoutSeconds: 21600
    stuckHeartbeatAgeMinutes: 20
    allocationStrategy: BEST_FIT_PROGRESSIVE
    useSpot: true
  # Job timeout / stuck / retry (standard queue only; long path retired 2026-05-10)
  jobTimeoutStandardSeconds: 21600
  stuckHeartbeatAgeStandardMinutes: 20
  retryNetworkUploadAttempts: 8
  retryFfmpegContentAttempts: 1
  # R2 업로드 안정화
  r2UploadPartSizeMb: 64
  r2UploadMaxConcurrency: 8
  r2UploadMaxAttempts: 8
  r2UploadCheckpointTable: academy-v1-video-upload-checkpoints
  # 관측/알람 SSOT
  observability:
    queueDepthAlarmThreshold: 50
    failedJobsAlarmThreshold: 5
    stuckDetectedAlarmEnabled: true
    logRetentionDays: 30
  # Ops: lightweight recovery. 1 instance max (maxvCpus=1), scale to 0 when idle.
  # m6g.medium = 1 vCPU + 4GB RAM. Ops reconcile/scanstuck jobdefs require 2048MB,
  # so c6g.medium(2GB) cannot reliably place jobs after ECS/Batch overhead.
  opsComputeEnvironmentName: academy-v1-video-ops-ce
  opsQueueName: academy-v1-video-ops-queue
  opsInstanceType: m6g.medium
  opsMaxvCpus: 1
  opsJobDefs:
    reconcile: academy-v1-video-ops-reconcile
    scanstuck: academy-v1-video-ops-scanstuck
    netprobe: academy-v1-video-ops-netprobe
    enqueueUploaded: academy-v1-video-ops-enqueue-uploaded
    purgeRaw: academy-v1-video-ops-purge-raw
    detectStuck: academy-v1-video-ops-detect-stuck

eventBridge:
  reconcileRuleName: academy-v1-reconcile-video-jobs
  scanStuckRuleName: academy-v1-video-scan-stuck-rate
  enqueueUploadedRuleName: academy-v1-enqueue-uploaded-videos
  detectStuckRuleName: academy-v1-detect-stuck-videos
  roleName: academy-v1-eventbridge-batch-video-role
  # 1시간 주기: ops CE 스케일업 빈도 감소 (10~30분이면 짧은 recovery job이 Batch EC2를 계속 깨울 수 있음)
  reconcileSchedule: "rate(1 hour)"
  scanStuckSchedule: "rate(1 hour)"
  enqueueUploadedSchedule: "rate(1 hour)"
  recoverDeadRuleName: academy-v1-recover-dead-video-jobs
  recoverDeadSchedule: "rate(2 hours)"
  recoverDeadState: ENABLED
  # 운영 자동 복구: 규칙은 ENABLED 유지. 배포 시 DISABLED면 ENABLED로 재설정 (resources/eventbridge.ps1).
  reconcileState: ENABLED
  scanStuckState: ENABLED
  enqueueUploadedState: ENABLED
  detectStuckSchedule: "rate(30 minutes)"
  detectStuckState: ENABLED
  purgeRawRuleName: academy-v1-purge-raw-videos
  purgeRawSchedule: "cron(0 18 * * ? *)"
  purgeRawState: ENABLED
  cleanupOrphanRuleName: academy-v1-cleanup-orphan-video-storage
  cleanupOrphanSchedule: "cron(0 19 ? * SAT *)"
  cleanupOrphanState: ENABLED

dynamodb:
  lockTableName: academy-v1-video-job-lock
  lockTableTtlAttribute: ttl
  lockTtlSeconds: 43200
  uploadCheckpointTableName: academy-v1-video-upload-checkpoints

rds:
  engine: postgres
  engineVersion: "15.17"
  instanceClass: "db.t4g.medium"
  allocatedStorage: 20
  dbIdentifier: academy-db
  dbSubnetGroupName: academy-v1-db-subnets
  masterUsername: admin97
  masterPasswordSsmParam: "/academy/rds/master_password"
  performanceInsightsEnabled: true
  performanceInsightsRetentionDays: 7
  deletionProtection: true
  publiclyAccessible: false
  # Runtime DB_HOST points directly at academy-db. RDS Proxy was retired on
  # 2026-07-10 after it stayed unused/unhealthy and billed fixed hourly cost.
  proxyName: ""
  proxyRequireTls: false
  multiAz: false

observability:
  logRetentionDays: 30
  alarmEvaluationPeriods: 2
  alarmPeriodSeconds: 300
  apiAlb5xxThreshold: 10
  apiTargetUnhealthyThreshold: 1
  sqsQueueDepthThreshold: 100
  sqsDlqDepthThreshold: 5
  batchQueueDepthThreshold: 50
  batchFailedJobsThreshold: 5
  batchStuckDetectedEnabled: true
  rdsCpuThresholdPercent: 80
  rdsFreeStorageGbThreshold: 5
  rdsConnectionsThreshold: 90
  redisCpuThresholdPercent: 75
  redisEvictionsThreshold: 100

operations:
  backupBucket: academy-v1-ops-backups-809466760795
  backupRetentionDays: 365
  backupNoncurrentRetentionDays: 30

redis:
  replicationGroupId: academy-v1-redis
  subnetGroupName: academy-v1-redis-subnets
  securityGroupId: ""
  nodeType: cache.t4g.small
  engineVersion: "7.1"

r2:
  bucket: ""
  publicBaseUrl: ""

# 프론트 정적 + R2 + CDN (엔드투엔드). S3 미사용·R2만.
# 도메인/라우팅: hakwonplus.com → Cloudflare Pages, api.<domain> → DNS-only ALB HTTPS(Cloudflare proxy off).
front:
  domains:
    app: "hakwonplus.com"          # canonical frontend host
    api: "https://api.hakwonplus.com"  # DNS-only CNAME → ALB HTTPS 443
  domainsApp: "hakwonplus.com"      # SSOT 스크립트용 flat 키 (domains.app과 동일)
  domainsApi: "https://api.hakwonplus.com"  # SSOT 스크립트용 flat 키 (domains.api과 동일)
  cors:
    allowedOrigins:
      - "https://hakwonplus.com"
      - "https://www.hakwonplus.com"
    credentials: true   # 쿠키 인증 사용 시 true
  deployStrategy: "versioned"  # versioned | atomic
  buildOutputDir: "dist"       # Vite 등 빌드 산출물 디렉터리(프론트 repo 기준)
  r2StaticBucket: ""           # 정적 배포용 R2 버킷(예: academy-storage)
  r2StaticPrefix: "static/front"  # 버전 디렉터리 상위 prefix
  purgeOnDeploy: true          # 배포 시 CDN 캐시 purge 여부
  cdnCacheControl:
    assetMaxAge: "31536000"    # 해시 파일명 정적 자산 1년
    indexMaxAge: "0"           # index.html no-cache 권장
  uploadDownload:
    multipartResume: true      # 대용량 multipart + resume/checkpoint
    signedUrlMethod: "server"  # server(서버 중계) | presigned
