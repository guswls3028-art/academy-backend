# INFRA SSOT v3 — 기계용 파라미터 (scripts_v3 참조용)
# 사람용 기준: docs/00-SSOT/INFRA-SSOT-V3.md
# 계약: docs/00-SSOT/INFRA-SSOT-V3.state-contract.md

global:
  env: prod
  region: ap-northeast-2
  # 실행 시 치환: aws sts get-caller-identity --query Account --output text
  accountId: "123456789012"
  tags:
    Project: academy
    ManagedBy: one-take-v3

network:
  vpcId: vpc-0831a2484f9b114c2
  # discover_api_network.ps1 또는 actual_state 기준으로 채움
  publicSubnets: []   # e.g. [subnet-xxx, subnet-yyy]
  privateSubnets: []  # 필요 시
  securityGroups:
    api: ""       # academy-api 인스턴스 연동 SG 또는 describe-security-groups
    workers: ""   # Messaging/AI 워커 SG
    batch: ""     # Batch CE SG (RDS 5432, Redis 6379 허용)
    redis: academy-redis-sg

ssm:
  apiEnv: /academy/api/env
  workersEnv: /academy/workers/env

ecr:
  apiRepo: academy-api
  videoWorkerRepo: academy-video-worker
  messagingWorkerRepo: academy-messaging-worker
  aiWorkerRepo: academy-ai-worker-cpu

api:
  # ALB 사용 시에만 설정 (확인 필요)
  albName: ""
  targetGroupName: ""
  instanceTagKey: Name
  instanceTagValue: academy-api
  elasticIp: 15.165.147.157
  apiBaseUrl: "http://15.165.147.157:8000"

build:
  instanceTagKey: Name
  instanceTagValue: academy-build-arm64

messagingWorker:
  asgName: academy-messaging-worker-asg
  launchTemplateName: academy-messaging-worker-lt

aiWorker:
  asgName: academy-ai-worker-asg
  launchTemplateName: academy-ai-worker-lt

videoBatch:
  computeEnvironmentName: academy-video-batch-ce-final
  videoQueueName: academy-video-batch-queue
  workerJobDefName: academy-video-batch-jobdef
  # Ops
  opsComputeEnvironmentName: academy-video-ops-ce
  opsQueueName: academy-video-ops-queue
  opsJobDefs:
    reconcile: academy-video-ops-reconcile
    scanstuck: academy-video-ops-scanstuck
    netprobe: academy-video-ops-netprobe

eventBridge:
  reconcileRuleName: academy-reconcile-video-jobs
  scanStuckRuleName: academy-video-scan-stuck-rate

rds:
  dbIdentifier: academy-db

redis:
  replicationGroupId: academy-redis
  subnetGroupName: academy-redis-subnets
  securityGroupId: academy-redis-sg

# R2/CDN: 외부 관리. 값은 .env/SSM에만 존재
r2:
  bucket: ""           # R2_VIDEO_BUCKET 등에서 로드
  publicBaseUrl: ""    # R2_PUBLIC_BASE_URL
