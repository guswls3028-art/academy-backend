# Academy SSOT v1 — 풀셋팅 단일소스. scripts/v1 전용.
# API ASG max=2 고정. VPC Endpoint 미사용. ARM64 (API/빌드/워커: t4g.medium, Video Batch: c6g.large). ECR immutable tag 필수.

global:
  env: prod
  region: ap-northeast-2
  accountId: "809466760795"
  namingPrefix: academy-
  validationMode: "Strict"
  tags:
    Project: academy
    ManagedBy: ssot-v1

# 2-tier: Public 2 + Private 2, NAT 1개. academy-v1-* 네이밍.
# 기존 RDS(academy-db) 사용 시 동일 VPC 사용.
network:
  vpcId: "vpc-0831a2484f9b114c2"
  vpcCidr: "172.30.0.0/16"
  publicSubnetCidr1: "172.30.0.0/24"
  publicSubnetCidr2: "172.30.2.0/24"
  privateSubnetCidr1: "172.30.1.0/24"
  privateSubnetCidr2: "172.30.3.0/24"
  natEnabled: true
  albEnabled: true
  natGatewayId: ""
  securityGroupApp: "sg-088fa3315c12754d0"
  securityGroupBatch: ""
  securityGroupData: ""
  vpcName: academy-v1-vpc
  sgAppName: academy-v1-sg-app
  sgBatchName: academy-v1-sg-batch
  sgDataName: academy-v1-sg-data

networkPublicSubnets:
  - ""
  - ""
networkPrivateSubnets:
  - ""
  - ""

ssm:
  apiEnv: /academy/api/env
  workersEnv: /academy/workers/env
  deployLockParam: /academy/deploy-lock

ecr:
  baseRepo: academy-base
  apiRepo: academy-api
  videoWorkerRepo: academy-video-worker
  messagingWorkerRepo: academy-messaging-worker
  aiWorkerRepo: academy-ai-worker-cpu
  immutableTagRequired: true

# API: max=1 (비용 절감, 개발/초기 단계)
api:
  amiId: ami-0885e191a9bcf28b0
  instanceProfile: academy-ec2-role
  securityGroupId: ""
  instanceType: t4g.medium
  userData: ""
  asgName: academy-v1-api-asg
  asgLaunchTemplateName: academy-v1-api-lt
  asgMinSize: 1
  asgMaxSize: 3
  asgDesiredCapacity: 1
  containerName: academy-api
  albName: academy-v1-api-alb
  targetGroupName: academy-v1-api-tg
  healthPath: /health
  instanceTagKey: Name
  instanceTagValue: academy-v1-api
  apiBaseUrl: ""

build:
  instanceTagKey: Name
  instanceTagValue: academy-build-arm64
  amiId: ami-0885e191a9bcf28b0
  instanceProfile: academy-ec2-role
  subnetId: ""
  securityGroupId: ""
  instanceType: t4g.medium

messagingWorker:
  asgName: academy-v1-messaging-worker-asg
  launchTemplateName: academy-v1-messaging-worker-lt
  instanceTagValue: academy-v1-messaging-worker
  amiId: ami-0885e191a9bcf28b0
  instanceType: t4g.medium
  minSize: 1
  maxSize: 10
  desiredCapacity: 1
  scaleInProtection: true
  scalingPolicyScaleOutCooldown: 300
  scalingPolicyScaleInCooldown: 900
  scalingPolicyScaleOutThreshold: 20
  scalingPolicyScaleInThreshold: 0
  sqsQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/809466760795/academy-v1-messaging-queue
  sqsQueueName: academy-v1-messaging-queue

aiWorker:
  asgName: academy-v1-ai-worker-asg
  launchTemplateName: academy-v1-ai-worker-lt
  instanceTagValue: academy-v1-ai-worker
  amiId: ami-0885e191a9bcf28b0
  instanceType: t4g.medium
  minSize: 1
  maxSize: 10
  desiredCapacity: 1
  scaleInProtection: true
  scalingPolicyScaleOutCooldown: 300
  scalingPolicyScaleInCooldown: 900
  scalingPolicyScaleOutThreshold: 20
  scalingPolicyScaleInThreshold: 0
  sqsQueueUrl: https://sqs.ap-northeast-2.amazonaws.com/809466760795/academy-v1-ai-queue
  sqsQueueName: academy-v1-ai-queue

videoBatch:
  # standard: 기존 계열 유지. 3시간 이하 일반 작업. maxvCpus=40, Spot 혼합.
  standard:
    computeEnvironmentName: academy-v1-video-batch-ce
    videoQueueName: academy-v1-video-batch-queue
    workerJobDefName: academy-v1-video-batch-jobdef
    minvCpus: 0
    maxvCpus: 40
    instanceType: c6g.xlarge
    rootVolumeSizeGb: 200
    jobTimeoutSeconds: 21600
    stuckHeartbeatAgeMinutes: 20
    allocationStrategy: BEST_FIT_PROGRESSIVE
    useSpot: true
  # long: 3시간 초과·장시간 작업. On-Demand 우선(Spot 중단 리스크 회피). maxvCpus=80.
  long:
    computeEnvironmentName: academy-v1-video-batch-long-ce
    videoQueueName: academy-v1-video-batch-long-queue
    workerJobDefName: academy-v1-video-batch-long-jobdef
    minvCpus: 0
    maxvCpus: 80
    instanceType: c6g.xlarge
    rootVolumeSizeGb: 300
    jobTimeoutSeconds: 43200
    stuckHeartbeatAgeMinutes: 45
    allocationStrategy: BEST_FIT
    useSpot: false
  # Job timeout / stuck / retry (3시간 영상 기준)
  jobTimeoutStandardSeconds: 21600
  jobTimeoutLongSeconds: 43200
  stuckHeartbeatAgeStandardMinutes: 20
  stuckHeartbeatAgeLongMinutes: 45
  retryNetworkUploadAttempts: 8
  retryFfmpegContentAttempts: 1
  # R2 업로드 안정화
  r2UploadPartSizeMb: 64
  r2UploadMaxConcurrency: 8
  r2UploadMaxAttempts: 8
  r2UploadCheckpointTable: academy-v1-video-upload-checkpoints
  # 관측/알람 SSOT
  observability:
    queueDepthAlarmThreshold: 50
    failedJobsAlarmThreshold: 5
    stuckDetectedAlarmEnabled: true
    logRetentionDays: 30
  # Ops (기존)
  opsComputeEnvironmentName: academy-v1-video-ops-ce
  opsQueueName: academy-v1-video-ops-queue
  opsInstanceType: m6g.medium
  opsMaxvCpus: 2
  opsJobDefs:
    reconcile: academy-v1-video-ops-reconcile
    scanstuck: academy-v1-video-ops-scanstuck
    netprobe: academy-v1-video-ops-netprobe

eventBridge:
  reconcileRuleName: academy-v1-reconcile-video-jobs
  scanStuckRuleName: academy-v1-video-scan-stuck-rate
  roleName: academy-v1-eventbridge-batch-video-role

dynamodb:
  lockTableName: academy-v1-video-job-lock
  lockTableTtlAttribute: ttl
  uploadCheckpointTableName: academy-v1-video-upload-checkpoints

rds:
  engine: postgres
  engineVersion: "15.16"
  instanceClass: "db.t4g.medium"
  allocatedStorage: 20
  dbIdentifier: academy-db
  dbSubnetGroupName: academy-v1-db-subnets
  masterUsername: admin97
  masterPasswordSsmParam: "/academy/rds/master_password"

redis:
  replicationGroupId: academy-v1-redis
  subnetGroupName: academy-v1-redis-subnets
  securityGroupId: ""
  nodeType: cache.t4g.small
  engineVersion: "7.1"

r2:
  bucket: ""
  publicBaseUrl: ""
