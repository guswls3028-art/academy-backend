[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "apps.api.config.settings.test"
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Fail fast, verbose output
addopts = "-v --tb=short -x"


# ── ruff: 정적 검증 (도입 사유 2026-05-10) ────────────────────────
# `views_hit_report.py` 의 MatchupProblem 미정의로 학원장 적중보고서 진입 500 사고
# 발생. D-9 분리(2026-05-08) 직후 동일 패턴(_is_tenant_staff 미정의) hotfix 한 번 더
# 있었음. CI/lint 부재가 진짜 구조 결함 → ruff 도입.
#
# 점진적 정책:
#   - F821 (undefined-name): 운영 NameError 직결 — 무조건 차단
#   - F401 (unused-import): 코드 위생 — 매치업 도메인부터 적용, 점진 확장
#   - 다른 룰(스타일 등) 은 별 사이클에서 도입
[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [
    ".venv",
    "venv",
    "migrations",
    "node_modules",
    "build",
    "dist",
    "__pycache__",
]

[tool.ruff.lint]
# Phase 1 (2026-05-10): F821 (undefined-name) 만 전 도메인 활성화.
# 운영 NameError 직결 — 빌드/배포 차단의 본질. 학원장 적중보고서 진입 500 사고 직접
# 원인은 F821 이었고 다른 룰(F401 등)은 위생 issue 일 뿐.
#
# Phase 2 후보 (별 사이클): F401 (unused-import) — 매치업 도메인부터 점진 도입.
# 64건 잔존 cleanup 부담이 매치업 hot-fix 사이클 범위 초과.
select = ["F821"]

[tool.ruff.lint.per-file-ignores]
# (Phase 2 정리 2026-05-10) 모든 forward-ref 가 TYPE_CHECKING import 추가로 해소.
# repositories_video.py logger 결함도 모듈 레벨 logger 정의 추가로 해소.
# 매치업 hot-fix 사이클에서 미뤘던 잔존 결함 모두 본 commit 에서 정리.
# F821 우회 ignore 0 — 신규 결함은 빌드 단계에서 차단.

# F401 — `__init__.py` 의 re-export 패턴은 정상. ruff 공식 권장 ignore.
# Python 관용: `from X import Y` 후 다른 모듈에서 `from package import Y` 가능하도록.
"**/__init__.py" = ["F401"]
