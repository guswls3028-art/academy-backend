[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "apps.api.config.settings.test"
pythonpath = ["."]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Fail fast, verbose output
addopts = "-v --tb=short -x"


# ── ruff: 정적 검증 (도입 사유 2026-05-10) ────────────────────────
# `views_hit_report.py` 의 MatchupProblem 미정의로 학원장 적중보고서 진입 500 사고
# 발생. D-9 분리(2026-05-08) 직후 동일 패턴(_is_tenant_staff 미정의) hotfix 한 번 더
# 있었음. CI/lint 부재가 진짜 구조 결함 → ruff 도입.
#
# 점진적 정책:
#   - F821 (undefined-name): 운영 NameError 직결 — 무조건 차단
#   - F401 (unused-import): 코드 위생 — 매치업 도메인부터 적용, 점진 확장
#   - 다른 룰(스타일 등) 은 별 사이클에서 도입
[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [
    ".venv",
    "venv",
    "migrations",
    "node_modules",
    "build",
    "dist",
    "__pycache__",
]

[tool.ruff.lint]
# Phase 1 (2026-05-10): F821 (undefined-name) 만 전 도메인 활성화.
# 운영 NameError 직결 — 빌드/배포 차단의 본질. 학원장 적중보고서 진입 500 사고 직접
# 원인은 F821 이었고 다른 룰(F401 등)은 위생 issue 일 뿐.
#
# Phase 2 후보 (별 사이클): F401 (unused-import) — 매치업 도메인부터 점진 도입.
# 64건 잔존 cleanup 부담이 매치업 hot-fix 사이클 범위 초과.
select = ["F821"]

[tool.ruff.lint.per-file-ignores]
# F821 — 별 도메인 forward-ref 결함 (모듈에 같은 이름 클래스 2종 — 매치업 외 작업).
# 매치업 hot-fix scope 와 분리. 별 작업 cycle 에서 TYPE_CHECKING import 정리 필요.
"apps/domains/progress/services/progress_pipeline.py" = ["F821"]
"apps/domains/video/services/video_encoding.py" = ["F821"]
# academy/ (헥사고날 도메인) — 별 도메인 forward-ref + 1 진짜 logger 결함
# (`repositories_video.py:759`). 매치업 hot-fix scope 와 분리. 별 cycle 에서 정리.
"academy/**" = ["F821"]
